name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MyGM roster slot regression
        run: python -m unittest tests.test_player_table_scoring.PlayerTableScoringTests.test_team_slot_assignment_map_overrides_save_roster_memberships -v

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  build:
    needs: test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build release executable
        run: pyinstaller NBA2K26Trainer.spec --noconfirm

      - name: Upload packaged executable
        uses: actions/upload-artifact@v4
        with:
          name: NBA2K26Trainer-windows
          path: dist/NBA2K26Trainer.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged executable
        uses: actions/download-artifact@v4
        with:
          name: NBA2K26Trainer-windows
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/NBA2K26Trainer.exe
