name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MyGM roster slot regression
        run: python -m unittest tests.test_player_table_scoring.PlayerTableScoringTests.test_team_slot_assignment_map_overrides_save_roster_memberships -v

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
